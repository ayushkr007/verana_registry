# ============================================================
# Docker Compose — Verana Ecosystem Automation
# ============================================================
# Setup (one-time):
#   ./setup.sh
#
# Run:
#   docker-compose up --build
#
# Watch live:
#   Open http://localhost:7900/vnc.html in your browser
#
# Reports:
#   After test run, check ./reports/emailable-report.html
# ============================================================

services:
  verana-test:
    build: .
    image: ayushkr007/verana-automation:latest
    environment:
      - KEPLR_PASSWORD=${KEPLR_PASSWORD}
    volumes:
      # Keplr Chrome profile (set up via setup.sh or launch_chrome.sh)
      - ~/selenium-keplr-profile:/root/selenium-keplr-profile
      # Test reports — available after test run in ./reports/
      - ./reports:/app/reports
    ports:
      # noVNC — watch the browser live at http://localhost:7900/vnc.html
      - "7900:7900"
    # Give Chrome enough shared memory to avoid crashes
    shm_size: '2gb'
